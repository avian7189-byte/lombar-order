<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>LOMBAR 官方預購系統 | TENUTE LOMBARDO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: "Heiti TC", "Microsoft JhengHei", sans-serif; background: #fdfdfb; }
        .tab-active { border-bottom: 4px solid #7f1d1d; color: #7f1d1d; font-weight: bold; }
        .wine-card { transition: all 0.3s ease; border: 1px solid #eee; overflow: hidden; }
        .wine-card:hover { transform: translateY(-3px); border-color: #7f1d1d; box-shadow: 0 10px 20px rgba(127, 29, 29, 0.05); }
        .safe-bottom { padding-bottom: 240px; }
        @media (min-width: 1024px) { .safe-bottom { padding-bottom: 180px; } }
    </style>
</head>
<body class="safe-bottom">

    <div id="order-page" class="max-w-4xl mx-auto px-4 text-gray-800">
        <header class="bg-red-950 text-white p-8 rounded-b-[2.5rem] shadow-xl text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-black tracking-widest uppercase">TENUTE LOMBARDO</h1>
            <p class="text-red-200 text-[10px] mt-2 tracking-[0.2em] opacity-80 uppercase font-light">倫巴杜酒莊 官方預購系統</p>
        </header>

        <div class="flex justify-center space-x-6 md:space-x-10 mb-6 border-b border-gray-100 sticky top-0 bg-white/90 backdrop-blur-md z-40 py-4">
            <button onclick="switchTab('red')" id="tab-red" class="tab-active pb-2 px-1 transition-all text-sm md:text-base">紅葡萄酒</button>
            <button onclick="switchTab('white')" id="tab-white" class="pb-2 px-1 transition-all text-sm md:text-base">白葡萄酒</button>
            <button onclick="switchTab('sparkling')" id="tab-sparkling" class="pb-2 px-1 transition-all text-sm md:text-base">氣泡酒</button>
        </div>

        <div id="wine-container" class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 mb-10"></div>

        <section id="info-section" class="bg-white p-6 rounded-3xl shadow-sm mb-10 border border-gray-100 hidden">
            <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                <span class="w-1.5 h-6 bg-red-800 rounded-full"></span> 配送與付款資訊
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="text" id="custName" placeholder="客戶姓名 (必填)" class="w-full bg-stone-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-800/20">
                <input type="tel" id="custPhone" placeholder="聯絡電話 (必填)" class="w-full bg-stone-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-800/20">
            </div>
            <input type="text" id="custAddress" placeholder="收件地址 (必填)" class="w-full bg-stone-50 p-4 rounded-xl outline-none focus:ring-2 focus:ring-red-800/20 mb-4">
            
            <div class="bg-blue-50 p-4 rounded-2xl mb-6 border border-blue-100">
                <p class="text-blue-800 text-[10px] font-bold mb-2 italic tracking-tighter">※ 若有填寫統編/抬頭，總金額將自動加計 5% 營業稅。</p>
                <input type="text" id="custTaxId" oninput="calculate()" placeholder="公司統編 / 抬頭 (選填)" class="w-full bg-white p-4 rounded-xl outline-none border border-blue-200 focus:ring-2 focus:ring-blue-400">
            </div>
            
            <div class="space-y-4 border-t pt-6">
                <p class="font-bold text-sm text-gray-700">選擇付款方式：</p>
                <div class="grid grid-cols-3 gap-2">
                    <label class="flex flex-col items-center p-3 bg-stone-50 rounded-xl cursor-pointer border-2 border-transparent has-[:checked]:border-red-800 shadow-sm text-xs transition">
                        <input type="radio" name="payMethod" value="現金" onchange="toggleBankInput(false)"><span>現金</span>
                    </label>
                    <label class="flex flex-col items-center p-3 bg-stone-50 rounded-xl cursor-pointer border-2 border-transparent has-[:checked]:border-red-800 shadow-sm text-xs transition">
                        <input type="radio" name="payMethod" value="匯款" onchange="toggleBankInput(true)"><span>匯款</span>
                    </label>
                    <label class="flex flex-col items-center p-3 bg-stone-50 rounded-xl cursor-pointer border-2 border-transparent has-[:checked]:border-red-800 shadow-sm text-xs transition">
                        <input type="radio" name="payMethod" value="貨到付款" onchange="toggleBankInput(false)"><span>貨到付款</span>
                    </label>
                </div>

                <div class="bg-red-50 p-5 rounded-2xl border border-red-100 mt-4">
                    <p class="font-bold text-red-900 text-sm mb-2 uppercase tracking-wider flex items-center gap-2">
                        🏦 匯款帳戶資訊
                    </p>
                    <div class="text-[12px] leading-relaxed text-red-800 space-y-1">
                        <p>銀行：玉山銀行 (808) 仁德分行</p>
                        <p>戶名：有集貿易有限公司</p>
                        <p>帳號：<span class="font-bold select-all">1137-940-267329</span></p>
                    </div>
                    <div id="bank-input-area" class="hidden mt-4 pt-4 border-t border-red-200">
                        <input type="text" id="bankLastFive" placeholder="請輸入匯款帳號後五碼" class="w-full bg-white p-4 rounded-xl outline-none border border-red-200 focus:ring-2 focus:ring-red-400">
                    </div>
                </div>
            </div>
        </section>

        <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 p-4 pb-10 lg:pb-6 z-50 shadow-[0_-10px_20px_rgba(0,0,0,0.05)]">
            <div class="max-w-4xl mx-auto">
                <div id="gift-select-container" class="hidden mb-3 w-full">
                    <select id="gift-choice" class="w-full border-2 border-red-100 rounded-lg p-2 text-xs bg-white font-bold text-red-900"></select>
                </div>
                <div class="flex items-center justify-between gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-1.5 mb-0.5">
                            <span id="display-plan-label" class="bg-red-900 text-white text-[9px] px-1.5 py-0.5 rounded font-bold uppercase">方案 A</span>
                            <span id="display-discount-label" class="text-red-700 text-[11px] font-black italic">享 9 折優惠</span>
                        </div>
                        <div class="flex flex-col">
                            <div class="flex items-baseline gap-1">
                                <p class="text-2xl font-black text-red-900 leading-none">$<span id="display-total">0</span></p>
                                <p class="text-[10px] text-gray-400 font-medium">共 <span id="total-qty" class="text-red-800 font-bold">0</span> 瓶</p>
                            </div>
                            <div class="flex gap-2 mt-1">
                                <p id="tax-note" class="hidden text-[9px] text-blue-600 font-bold tracking-tighter italic">已含5%稅</p>
                                <p id="ship-note" class="text-[9px] text-green-700 font-bold tracking-tighter italic">全程冷藏配送</p>
                            </div>
                        </div>
                    </div>
                    <button onclick="goToInfo()" id="main-btn" class="flex-1 max-w-[160px] bg-red-800 text-white py-4 rounded-xl font-bold text-base shadow-lg active:scale-95 transition-all">下一步</button>
                </div>
            </div>
        </div>
    </div>

    <div id="success-page" class="hidden fixed inset-0 bg-stone-100 z-[100] overflow-y-auto p-4">
        <div class="max-w-md mx-auto my-6 bg-white rounded-3xl shadow-2xl overflow-hidden border-2 border-red-900">
            <div class="bg-red-950 text-white p-6 text-center">
                <h2 class="text-2xl font-black tracking-widest uppercase italic">Order Summary</h2>
                <p class="text-xs text-red-200 mt-1 uppercase">訂購明細</p>
            </div>
            <div id="receipt-content" class="p-6 space-y-4 text-sm text-gray-800"></div>
        </div>
        <div class="text-center mt-6 pb-10">
            <button onclick="location.reload()" class="bg-gray-800 text-white px-8 py-3 rounded-full font-bold">建立新訂單</button>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_OPAqOBadxdYGcdH1DsulDI8YCap1bLWbSCre7B8rarLuIsrrOeUeH9vbXeskozx0Mg/exec';

        const WINES = {
            red: [
                { id: 'r1', name: "尼祿 高地黑魂 NERO D’ALTURA (750ml)", price: 1200, img: "https://lh3.googleusercontent.com/d/1DioZpo8wGeVkTB2DpZV0n01refIXGFlz" },
                { id: 'r2', name: "尼祿 高地黑魂 NERO D’ALTURA (1500ml)", price: 3600, img: "https://lh3.googleusercontent.com/d/1DioZpo8wGeVkTB2DpZV0n01refIXGFlz" },
                { id: 'r3', name: "芙歐蕾 玫瑰黑織 FIORE DI NERO (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/1LfEH9Dn2JoaoFvH5xppT3pS4U4oaEmoR" },
                { id: 'r4', name: "三韻之丹 UNÀNIME ROSSO (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/1_isAdBhpUM3aGydWqaiQwUv69MXk7Ox4"  },
                { id: 'r5', name: "我是 EIMI (750ml)", price: 2880, img: "https://lh3.googleusercontent.com/d/1OhliRirdXkph4LF9vHhRdTwUIoI4A-N2" },
                { id: 'r6', name: "我是 EIMI (1500ml)", price: 7200, img: "https://lh3.googleusercontent.com/d/1OhliRirdXkph4LF9vHhRdTwUIoI4A-N2" },
                { id: 'r7', name: "牧神潘 秘露 PASSADINERO (500ml)", price: 1880, img: "https://lh3.googleusercontent.com/d/1M7uVqZPxZaAknILfIinV4tcg1wquVUMU" }
            ],
            white: [
                { id: 'w1', name: "卡塔拉托 柑香白影 CATARRATTO D’ALTURA (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/1bsrfvrlVMYBadH8CocfOZJNmEEqPwPrJ" },
                { id: 'w2', name: "格里洛 海風芬馥 GRILLO D’ALTURA (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/1MyORyqkghcArdrydruv_QFCrlzWNSeD3" },
                { id: 'w3', name: "三韻之翡 UNÀNIME BIANCO (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/1h8EcNTVwzBYHhNlKJo98ebq0wkPue08Z" },
                { id: 'w4', name: "本是 ESTÌ (750ml)", price: 1980, img: "https://lh3.googleusercontent.com/d/1xVJaAoxlVp3fwN7AfE_xFIaANQFv5Ai0" }
            ],
            sparkling: [
                { id: 's1', name: "蘇阿爾特札・空光 SUALTEZZA 650 (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/1jX4JFHwmsEGcYFKhs7JQ74eVwGwzMJfK" },
                { id: 's2', name: "蘇阿爾特札・空光 SUALTEZZA 650 (1500ml)", price: 3600, img: "https://lh3.googleusercontent.com/d/1jX4JFHwmsEGcYFKhs7JQ74eVwGwzMJfK" },
                { id: 's3', name: "蘇阿爾特札・空玫 ROSÉ (750ml)", price: 980, img: "https://lh3.googleusercontent.com/d/16Dt1ZSjLKnTNoVdrh0CA-KimgmBvN2PR" },
                { id: 's4', name: "蘇阿爾特札・空玫 ROSÉ (1500ml)", price: 3600, img: "https://lh3.googleusercontent.com/d/16Dt1ZSjLKnTNoVdrh0CA-KimgmBvN2PR" },
                { id: 's5', name: "達圖拉 高地極釀 D’ALTURA (750ml)", price: 3600, img: "https://lh3.googleusercontent.com/d/1m_akdnqdD5mZ9Jk7fzFPZTEz1LUyUrMg" }


            ]
        };

        const GIFT_OPTIONS = ["尼祿 高地黑魂 (750ml)", "芙歐蕾 玫瑰黑織 (750ml)", "三韻之丹 (750ml)", "卡塔拉托 柑香白影 (750ml)", "格里洛 海風芬馥 (750ml)", "三韻之翡 (750ml)", "蘇阿爾特札・空光 (750ml)", "蘇阿爾特札・空玫 ROSÉ (750ml)"];

        let cart = {}; let currentPlanFull = "";

        function switchTab(type) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('tab-active'));
            document.getElementById('tab-' + type).classList.add('tab-active');
            const container = document.getElementById('wine-container');
            container.innerHTML = WINES[type].map(wine => `
                <div class="wine-card bg-white rounded-[2rem] p-3 flex flex-col shadow-sm border border-stone-50">
                    <div class="w-full h-32 md:h-48 mb-3 bg-white flex items-center justify-center overflow-hidden rounded-2xl">
                        ${wine.img ? `<img src="${wine.img}" class="max-h-full max-w-full object-contain">` : `<span class="text-3xl grayscale opacity-20">🍷</span>`}
                    </div>
                    <h3 class="font-bold text-gray-800 text-[11px] md:text-xs mb-3 h-8 overflow-hidden leading-tight italic uppercase tracking-tighter">${wine.name}</h3>
                    <div class="flex items-center justify-between mt-auto">
                        <p class="text-red-900 font-black text-sm md:text-lg">$${wine.price}</p>
                        <div class="flex items-center space-x-2">
                            <button onclick="updateQty('${wine.id}', -1, ${wine.price}, '${wine.name}')" class="w-7 h-7 rounded-lg bg-stone-100 font-bold">-</button>
                            <span id="qty-${wine.id}" class="font-bold text-xs w-4 text-center">${cart[wine.id]?.qty || 0}</span>
                            <button onclick="updateQty('${wine.id}', 1, ${wine.price}, '${wine.name}')" class="w-7 h-7 rounded-lg bg-red-800 text-white font-bold">+</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, change, price, name) {
            if (!cart[id]) cart[id] = { qty: 0, price: price, name: name };
            cart[id].qty = Math.max(0, cart[id].qty + change);
            document.getElementById('qty-' + id).innerText = cart[id].qty;
            calculate();
        }

        function calculate() {
            let totalQty = 0; let rawPrice = 0; let items = Object.values(cart).filter(i => i.qty > 0);
            let lowQty = 0; let highQty = 0;
            items.forEach(i => { totalQty += i.qty; rawPrice += (i.qty * i.price); if(i.price <= 2880) lowQty += i.qty; if(i.price >= 3600) highQty += i.qty; });

            let plan = 'A'; let disc = 0.9; let text = "享 9 折優惠"; let ship = 300; let gifts = [];
            
            // 運費與折扣邏輯
            if(totalQty >= 6) { plan = 'D'; disc = 0.8; text = "全單 8 折 (免運)"; ship = 0; gifts = GIFT_OPTIONS; }
            else if(highQty >= 3) { plan = 'C'; disc = 0.85; text = "高價滿 3 瓶 8.5 折 (免運)"; ship = 0; gifts = ["特選紅酒 (一瓶)", "特選白酒 (一瓶)"]; }
            else if(lowQty >= 3) { plan = 'B'; disc = 0.85; text = "平價滿 3 瓶 8.5 折 (免運)"; ship = 0; }
            else { 
                plan = 'A'; disc = 0.9; 
                // 兩瓶以下收 300 運費
                ship = (totalQty > 0 && totalQty <= 2) ? 300 : 0; 
                text = (totalQty <= 2) ? "2 瓶以下加運費 300" : "享 9 折優惠";
            }

            currentPlanFull = "方案 " + plan + " (" + text + ")";
            let subtotal = totalQty > 0 ? Math.round(rawPrice * disc) + ship : 0;
            
            const taxInput = document.getElementById('custTaxId').value;
            let isTaxed = taxInput && taxInput.trim() !== "";
            let finalTotal = isTaxed ? Math.round(subtotal * 1.05) : subtotal;
            
            document.getElementById('tax-note').classList.toggle('hidden', !isTaxed);
            document.getElementById('ship-note').innerText = (ship > 0) ? `含運費$300 (冷藏配送)` : `全程冷藏配送 (免運費)`;
            document.getElementById('display-plan-label').innerText = "方案 " + plan;
            document.getElementById('display-discount-label').innerText = text;
            document.getElementById('total-qty').innerText = totalQty;
            document.getElementById('display-total').innerText = finalTotal.toLocaleString();
            
            const gCon = document.getElementById('gift-select-container');
            const gSel = document.getElementById('gift-choice');
            if(gifts.length > 0) { 
                gCon.classList.remove('hidden'); 
                gSel.innerHTML = '<option value="">-- 請選擇方案贈酒 --</option>' + gifts.map(g => `<option value="${g}">${g}</option>`).join(''); 
            } else { gCon.classList.add('hidden'); gSel.innerHTML = ""; }
        }

        function toggleBankInput(show) { document.getElementById('bank-input-area').classList.toggle('hidden', !show); }
        function goToInfo() { 
            if(document.getElementById('display-total').innerText == "0") return alert("請先選購產品"); 
            document.getElementById('info-section').classList.remove('hidden'); 
            document.getElementById('info-section').scrollIntoView({behavior:'smooth'}); 
            document.getElementById('main-btn').innerText = "確認並提交預購單"; 
            document.getElementById('main-btn').onclick = submitOrder; 
        }

        async function submitOrder() {
            const name = document.getElementById('custName').value; const phone = document.getElementById('custPhone').value;
            const addr = document.getElementById('custAddress').value; const pay = document.querySelector('input[name="payMethod"]:checked')?.value;
            const taxId = document.getElementById('custTaxId').value;
            const gift = document.getElementById('gift-choice').value;
            
            if(!name || !phone || !addr || !pay) return alert("請填寫收件資訊");
            if(pay === '匯款' && !document.getElementById('bankLastFive').value) return alert("請填寫匯款後五碼");

            const btn = document.getElementById('main-btn');
            btn.innerText = "提交中..."; btn.disabled = true;

            const data = { 
                customerName: name, customerPhone: phone, address: addr, taxId: taxId || "無", 
                total: document.getElementById('display-total').innerText, 
                plan: currentPlanFull, gift: gift || "無", 
                itemsDetail: Object.values(cart).filter(i => i.qty > 0).map(i => `${i.name}x${i.qty}`).join(','), 
                paymentMethod: pay, bankLastFive: document.getElementById('bankLastFive').value 
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                document.getElementById('receipt-content').innerHTML = `
                    <p>客戶：${name}</p><p>付款：${pay}</p><p>金額：$${data.total}</p>
                    <p class="text-xs text-red-700 mt-2 font-bold">${currentPlanFull}</p>
                    <p class="text-xs mt-2 border-t pt-2">${data.itemsDetail.replace(/,/g, '<br>')}</p>
                `;
                document.getElementById('order-page').classList.add('hidden'); 
                document.getElementById('success-page').classList.remove('hidden');
            } catch (e) { alert("提交失敗"); btn.disabled = false; }
        }
        switchTab('red');
    </script>
</body>
</html>
